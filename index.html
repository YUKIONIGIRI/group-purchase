<!-- タブやSNS共有時に表示されるタイトル。好きに変えてください -->
<title>YUKI🍙❄️の共同購入</title>
<style>
html, body { margin: 0; padding: 0; height: 100%; background: #EAEEF1; }
iframe { display: block; border: 0; width: 100%; height: 100%; }

/* 読み込み中オーバーレイ：iframeの中身（GASのフォーム）が表示され終わるまで、
    その手前に重ねて「読み込み中」を出しておく。iframe側のonloadで自動的に消える。 */
#loadingOverlay {
position: fixed; inset: 0;
display: flex; flex-direction: column; align-items: center; justify-content: center;
gap: 16px;
background: #EAEEF1;
z-index: 10;
transition: opacity .35s ease;
}
#loadingOverlay.is-hidden {
opacity: 0;
pointer-events: none;
}
.loading-spinner {
width: 40px; height: 40px;
border: 4px solid #D7DEE4;
border-top-color: #6C5CE7;
border-radius: 50%;
animation: loading-spin 0.8s linear infinite;
}
.loading-text {
font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
font-size: 0.9rem;
color: #667;
}
@keyframes loading-spin {
to { transform: rotate(360deg); }
}

  /* 常時表示の小さな「直接開く」リンク：Google側の仕様により、埋め込み（iframe）だと
     ログイン状態などの影響でまれに表示できないことがある。その場合、ブラウザが
     iframe内にエラー画面を出すだけでも「読み込み完了」の扱いになり得るため、
     読み込み中オーバーレイの表示状態に関係なく、常にこのリンクだけは操作できるようにしておく。 */
  #directOpenLink {
    position: fixed;
    right: 12px; bottom: 12px;
    z-index: 20;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    font-size: 0.72rem;
    color: #667;
    background: rgba(255,255,255,.9);
    border: 1px solid #D7DEE4;
    border-radius: 8px;
    padding: 6px 10px;
    text-decoration: none;
  }
</style>
</head>
